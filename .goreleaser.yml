version: 2

project_name: myteam

builds:
  - id: myteam
    main: ./cmd/myteam
    dir: server
    binary: myteam
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: myteam
    repository:
      owner: MyAIOSHub
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/MyAIOSHub/MyTeam"
    description: "MyTeam CLI — local agent runtime and management tool for the MyTeam platform"
    license: "Apache-2.0"
    install: |
      bin.install "myteam"
    test: |
      system "#{bin}/myteam", "version"
