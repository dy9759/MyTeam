name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate React catalog
        run: node scripts/check-react-catalog.mjs

      - name: Build, type check, and test (web)
        run: pnpm build && pnpm typecheck && pnpm test

      # Desktop (electron) — typecheck + unit tests only.
      # `pnpm --filter @myteam/desktop build` invokes electron-builder
      # which needs a mac runner; skip on ubuntu CI. Issue #52.
      - name: Type check + test (desktop)
        run: pnpm --filter @myteam/desktop typecheck && pnpm --filter @myteam/desktop test

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: myteam
          POSTGRES_USER: myteam
          POSTGRES_PASSWORD: myteam
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myteam -d myteam"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://myteam:myteam@localhost:5432/myteam?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          # Keep this in sync with `server/go.mod` and AGENTS.md §CI
          # Requirements. Issue #53.
          go-version: "1.26.1"
          cache-dependency-path: server/go.sum

      - name: Build
        run: cd server && go build ./...

      - name: Run migrations
        run: cd server && go run ./cmd/migrate up

      - name: Test
        run: cd server && go test -race ./...
